<div class="w-full">
  @if (label) {
    <label [for]="id" class="block text-sm font-semibold text-slate-700 mb-1">
      {{ label }}
    </label>
  }

  <div class="relative">
    <input
      [id]="id"
      [type]="currentType"
      [value]="value"
      [disabled]="disabled()"
      [placeholder]="placeholder"
      (input)="handleInput($event)"
      (blur)="onTouched()"
      class="w-full px-4 py-3 rounded-xl border outline-none transition-all duration-200 border-slate-200 focus:ring-2 focus:ring-indigo-500 bg-white text-slate-900"
      [ngClass]="inputClasses()"
    />

    @if(type() === 'password'){
      <button
        type="button"
        (click)="togglePasswordVisibility()"
        class="absolute right-3 top-1/2 -translate-y-1/2 p-1.5 text-slate-400 hover:text-indigo-600 transition-colors focus:outline-none"
        tabindex="-1"
      >
        @if(!passwordVisible()){
          <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
          </svg>
        }
        @else {
          <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l18 18" />
          </svg>
        }
      </button>
    }
  </div>

  @if(hasError() || hint) {
    <div class="h-5">
      @if (hasError()) {
        <p class="mt-1 text-xs text-red-600 font-medium animate-in fade-in slide-in-from-top-1">
          {{ errorMessage }}
        </p>
      }
      @else if (hint) {
        <p class="text-xs text-slate-500 font-normal italic">
          {{ hint }}
        </p>
      }
    </div>
  }
</div>
