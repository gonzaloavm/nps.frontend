<button
  [type]="type"
  [disabled]="disabled || isLoading"
  class="w-full font-bold py-3 px-4 rounded-xl transition-all shadow-lg flex justify-center items-center disabled:cursor-not-allowed"
  [class]="buttonClasses"
>
  @if (isLoading) {
    <svg class="animate-spin h-5 w-5 text-white mr-2" fill="none" viewBox="0 0 24 24">
      <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
      <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
    </svg>
    <span>Cargando...</span>
  } @else {
    <ng-content></ng-content>
  }
</button>
