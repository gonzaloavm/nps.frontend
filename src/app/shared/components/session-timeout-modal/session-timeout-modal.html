@if (activityService.isWarningVisible()) {
  <div class="fixed inset-0 z-50 flex items-center justify-center">
    <div class="absolute inset-0 bg-black/60"></div>

    <div
      role="dialog"
      aria-modal="true"
      class="relative z-10 w-11/12 max-w-xl bg-white rounded-2xl shadow-2xl p-6 md:p-8"
      (click)="$event.stopPropagation()"
    >
      <h2 class="text-2xl md:text-3xl font-semibold mb-4 text-gray-900">
        Tu sesión está por expirar
      </h2>

      <p class="text-lg text-gray-700 mb-6">
        Queda
        <span class="inline-block ml-2 mr-2 text-3xl md:text-4xl font-extrabold text-gray-900">
          {{ remainingSeconds() }}
        </span>
        segundo(s) de actividad.
      </p>

      <div class="flex flex-col md:flex-row gap-3 md:gap-6 justify-center">
        <button
          (click)="onKeepSession()"
          class="w-full md:w-auto px-6 py-3 bg-green-600 hover:bg-green-700 text-white rounded-lg text-lg font-medium shadow transition-all"
          [disabled]="activityService.isRefreshing()"
        >
          {{ activityService.isRefreshing() ? 'Renovando...' : 'Mantener sesión' }}
        </button>

        <button
          (click)="onLogout()"
          class="w-full md:w-auto px-6 py-3 bg-red-100 hover:bg-red-200 text-red-700 rounded-lg text-lg font-medium transition-all"
        >
          Cerrar sesión ahora
        </button>
      </div>
    </div>
  </div>
}
