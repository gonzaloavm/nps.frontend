<div class="max-w-2xl mx-auto">
  <div class="mb-6">
    <h2 class="text-2xl font-bold text-slate-800">Gestión de Votantes</h2>
    <p class="text-slate-500 text-sm">Registrar un nuevo usuario con rol de Votante en el sistema.</p>
  </div>

  <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
    <div class="p-6">
      <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="space-y-5">

        @if (successMessage()) {
          <div class="bg-emerald-50 border-l-4 border-emerald-500 p-4 rounded-md">
            <div class="flex">
              <div class="flex-shrink-0">
                <svg class="h-5 w-5 text-emerald-500" viewBox="0 0 20 20" fill="currentColor">
                  <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd" />
                </svg>
              </div>
              <p class="ml-3 text-sm text-emerald-700 font-medium">{{ successMessage() }}</p>
            </div>
          </div>
        }

        @if (errorMessage()) {
          <div class="bg-rose-50 border-l-4 border-rose-500 p-4 rounded-md">
            <p class="text-sm text-rose-700">{{ errorMessage() }}</p>
          </div>
        }

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div>
            <label class="block text-sm font-semibold text-slate-700 mb-1">Nombre de Usuario</label>
            <input
              type="text"
              formControlName="username"
              placeholder="voter_123"
              class="w-full px-4 py-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all"
            />
          </div>

          <div>
            <label class="block text-sm font-semibold text-slate-700 mb-1">Contraseña Temporal</label>
            <input
              type="password"
              formControlName="password"
              placeholder="••••••••"
              class="w-full px-4 py-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all"
            />
          </div>
        </div>

        <div class="pt-4 border-t border-slate-100 flex justify-end">
          <button
            type="submit"
            [disabled]="registerForm.invalid || isLoading()"
            class="px-6 py-2.5 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold rounded-lg shadow-md disabled:opacity-50 disabled:cursor-not-allowed flex items-center gap-2 transition-all"
          >
            @if(isLoading()){
              <svg class="animate-spin h-5 w-5 text-white" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" fill="none"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
              </svg>
              Guardando...
            } @else {
              <span>Crear Votante</span>
            }
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
