<div class="w-full max-w-md">
  <!-- Títulos -->
  <div class="text-center mb-8">
    <h1 class="text-3xl font-extrabold text-slate-900">Bienvenido</h1>
    <p class="text-sm text-slate-500 mt-2">Ingresa tus credenciales para continuar</p>
  </div>

  <!-- Tarjeta del formulario -->
  <div class="bg-white p-8 rounded-2xl shadow-xl border border-slate-100">
    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-6">
      <!-- Mensaje de error -->
      @if (errorMessage()) {
        <div class="bg-red-50 border-l-4 border-red-500 p-4 rounded-md">
          <p class="text-sm text-red-700">{{ errorMessage() }}</p>
        </div>
      }

      <!-- Campo Usuario -->
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Usuario</label>
        <input
          type="text"
          formControlName="username"
          placeholder="ej. user_"
          class="w-full px-3 py-2 border border-slate-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500"
        />
      </div>

      <!-- Campo Contraseña -->
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Contraseña</label>
        <input
          type="password"
          formControlName="password"
          placeholder="••••••••"
          class="w-full px-3 py-2 border border-slate-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500"
        />
      </div>

      <!-- Botón de envío -->
      <button
        type="submit"
        [disabled]="loginForm.invalid || isLoading()"
        class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 disabled:opacity-50 disabled:cursor-not-allowed"
      >
      @if(isLoading()){
        <span>Cargando...</span>
      }
      @else {
        <span>Iniciar Sesión</span>
      }
      </button>
    </form>
  </div>
</div>
