<div class="w-full max-w-md">
  <div class="text-center mb-8">
    <div class="inline-flex items-center justify-center w-16 h-16 bg-indigo-100 rounded-full mb-4">
      <span class="text-2xl font-black text-indigo-600">NPS</span>
    </div>
    <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight">Sistema de Votación</h1>
    <p class="text-sm text-slate-500 mt-2">Plataforma de Medición de Lealtad y Satisfacción</p>
  </div>

  <div class="bg-white p-8 rounded-2xl shadow-xl border border-slate-100">
    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-6">

      @if (errorMessage()) {
        <div class="bg-red-50 border-l-4 border-red-500 p-4 rounded-md animate-pulse">
          <p class="text-sm text-red-700 font-medium">{{ errorMessage() }}</p>
        </div>
      }

      <div class="space-y-1">
        <label class="block text-sm font-semibold text-slate-700">Usuario</label>
        <input
          type="text"
          formControlName="username"
          placeholder="user_"
          class="w-full px-3 py-2 border border-slate-300 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-all"
        />
      </div>

      <div class="space-y-1">
        <label class="block text-sm font-semibold text-slate-700">Contraseña</label>
        <input
          type="password"
          formControlName="password"
          placeholder="••••••••"
          class="w-full px-3 py-2 border border-slate-300 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-all"
        />
      </div>

      <button
        type="submit"
        [disabled]="loginForm.invalid || isLoading()"
        class="w-full flex justify-center py-2.5 px-4 border border-transparent rounded-lg shadow-sm text-sm font-bold text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 disabled:opacity-50 disabled:cursor-not-allowed transition-colors"
      >
        @if(isLoading()){
          <div class="flex items-center gap-2">
            <svg class="animate-spin h-4 w-4 text-white" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            <span>Autenticando...</span>
          </div>
        }
        @else {
          <span>Entrar al Dashboard</span>
        }
      </button>
    </form>
  </div>

  <p class="text-center text-xs text-slate-400 mt-6 uppercase tracking-widest">
    &copy; 2026 NPS Analytics Tool
  </p>
</div>
