server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        # Esto es vital para Angular: si no encuentra la ruta,
        # redirige a index.html para que el router de Angular tome el mando.
        try_files $uri $uri/ /index.html;
    }

    # Opcional: Manejo de errores
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
